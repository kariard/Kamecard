name: Prüfen und auf GitHub Pages veröffentlichen

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Prüfen und bauen
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Lint-Prüfung
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Produktionsbuild
        run: npm run build

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: GitHub Pages veröffentlichen
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Pages-Artefakt veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
